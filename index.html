    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        /* Glassmorphism Core */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
            border-color: rgba(139, 92, 246, 0.5);
        }

        button, .file-label, .mode-tab, .format-option {
            transition: all 0.25s ease;
            cursor: pointer;
        }

        button:active { transform: scale(0.97); }

        /* Navigation */
        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            color: #a855f7;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Main Content */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(59, 130, 246, 0.1));
            border-radius: 48px;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Tabs */
        .mode-tabs {
            display: flex;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 60px;
            padding: 6px;
            width: fit-content;
            margin-bottom: 2rem;
        }

        .mode-tab {
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 600;
            background: transparent;
            color: #94a3b8;
            border: none;
            font-size: 1rem;
        }

        .mode-tab.active {
            background: linear-gradient(120deg, #8b5cf6, #3b82f6);
            color: white;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .mode-tab.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Format Grid */
        .format-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .format-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .format-option:hover, .format-option.selected {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border-color: transparent;
            transform: translateY(-2px);
        }

        .format-option i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Input Area */
        .input-card {
            padding: 2rem;
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 1rem;
            color: white;
            font-size: 1rem;
            resize: vertical;
            font-family: 'Inter', sans-serif;
        }

        textarea:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .btn-primary {
            background: linear-gradient(95deg, #8b5cf6, #3b82f6);
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }

        /* Pricing Cards */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .pricing-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .pricing-card.popular {
            border: 2px solid #8b5cf6;
            transform: scale(1.05);
        }

        .price {
            font-size: 3rem;
            font-weight: 800;
            margin: 1rem 0;
        }

        .original-price {
            text-decoration: line-through;
            color: #94a3b8;
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }

        .current-price {
            color: #8b5cf6;
        }

        .countdown {
            background: rgba(139, 92, 246, 0.2);
            padding: 0.5rem;
            border-radius: 40px;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        /* History Items */
        .history-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
            transition: 0.3s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            max-width: 450px;
            width: 90%;
            padding: 2rem;
        }

        .auth-card input {
            width: 100%;
            margin: 0.75rem 0;
            padding: 12px;
            border-radius: 28px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .ad-banner {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            text-align: center;
            padding: 8px;
            border-radius: 40px;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .hidden {
            display: none;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .pricing-card.popular {
                transform: scale(1);
            }
            .format-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // API Configuration
        const API_URL = 'https://your-backend-api.replit.app'; // Replace with your backend URL
        
        // Format Options
        const FORMATS = [
            { name: 'Microsoft Word', icon: 'fa-file-word', color: '#2b5797' },
            { name: 'Microsoft Excel', icon: 'fa-file-excel', color: '#217346' },
            { name: 'Microsoft Access', icon: 'fa-database', color: '#a4373a' },
            { name: 'Microsoft PowerPoint', icon: 'fa-file-powerpoint', color: '#d35230' },
            { name: 'Microsoft Outlook', icon: 'fa-envelope', color: '#0078d4' },
            { name: 'Microsoft OneNote', icon: 'fa-book', color: '#7719aa' },
            { name: 'Google Docs', icon: 'fa-file-alt', color: '#4285f4' },
            { name: 'Google Sheets', icon: 'fa-table', color: '#0f9d58' },
            { name: 'Google Slides', icon: 'fa-chalkboard', color: '#f4b400' },
            { name: 'Google Forms', icon: 'fa-clipboard-list', color: '#db4437' },
            { name: 'LibreOffice', icon: 'fa-file', color: '#18a303' },
            { name: 'Apache OpenOffice', icon: 'fa-file', color: '#0096d6' },
            { name: 'WPS Office', icon: 'fa-file', color: '#f8c300' },
            { name: 'Zoho Office Suite', icon: 'fa-cloud', color: '#ea3c3c' },
            { name: 'Tally', icon: 'fa-calculator', color: '#00a651' },
            { name: 'Busy Accounting', icon: 'fa-chart-line', color: '#ff6b6b' },
            { name: 'QuickBooks', icon: 'fa-chart-pie', color: '#2ca01c' },
            { name: 'Notepad', icon: 'fa-edit', color: '#ffffff' },
            { name: 'WordPad', icon: 'fa-pencil-alt', color: '#ffffff' }
        ];

        let currentUser = null;
        let currentView = 'home';
        let selectedMode = 'standard';
        let selectedFormat = 'Microsoft Word';
        let token = localStorage.getItem('token');

        // Check authentication
        if (token) {
            verifyToken();
        }

        async function verifyToken() {
            try {
                const response = await fetch(`${API_URL}/api/verify`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                } else {
                    localStorage.removeItem('token');
                }
            } catch (error) {
                console.error('Verification failed:', error);
            }
            renderApp();
        }

        // Razorpay Payment Handler
        function initPayment(planType, amount, planName) {
            if (!currentUser) {
                alert('Please login first');
                showAuthModal();
                return;
            }

            const options = {
                key: 'YOUR_RAZORPAY_KEY_ID', // Replace with your Razorpay Key ID
                amount: amount * 100, // Amount in paise
                currency: 'INR',
                name: 'AI Project Generator',
                description: `${planName} Plan Subscription`,
                handler: async function(response) {
                    // Verify payment on backend
                    const paymentData = {
                        razorpay_payment_id: response.razorpay_payment_id,
                        plan_type: planType,
                        amount: amount,
                        user_id: currentUser.id
                    };
                    
                    try {
                        const res = await fetch(`${API_URL}/api/verify-payment`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify(paymentData)
                        });
                        
                        if (res.ok) {
                            const data = await res.json();
                            currentUser.plan = data.plan;
                            alert(`Successfully upgraded to ${planName} plan!`);
                            renderApp();
                        } else {
                            alert('Payment verification failed. Please contact support.');
                        }
                    } catch (error) {
                        alert('Error verifying payment');
                    }
                },
                prefill: {
                    name: currentUser.name,
                    email: currentUser.email,
                },
                theme: {
                    color: '#8b5cf6'
                }
            };
            
            const razorpay = new Razorpay(options);
            razorpay.open();
        }

        // Generate Project
        async function generateProject() {
            if (!currentUser) {
                alert('Please login to generate projects');
                showAuthModal();
                return;
            }
            
            const input = document.getElementById('projectInput').value;
            if (!input.trim()) {
                alert('Please describe your project idea');
                return;
            }
            
            if (currentUser.plan === 'free' && input.length > 180) {
                alert('Free plan limited to 180 characters. Upgrade to Pro for unlimited input.');
                return;
            }
            
            const generateBtn = document.getElementById('generateBtn');
            generateBtn.innerHTML = '<div class="loader"></div> Generating...';
            generateBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/api/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        input: input,
                        mode: selectedMode,
                        format: selectedFormat
                    })
                });
                
                const data = await response.json();
                if (response.ok) {
                    displayResult(data.result);
                    if (currentView === 'history') loadHistory();
                } else {
                    alert(data.error || 'Generation failed');
                }
            } catch (error) {
                alert('Error connecting to server');
            } finally {
                generateBtn.innerHTML = '<i class="fas fa-magic"></i> Generate Project';
                generateBtn.disabled = false;
            }
        }
        
        function displayResult(result) {
            const resultDiv = document.getElementById('resultArea');
            resultDiv.innerHTML = `
                <div class="glass-card" style="padding: 2rem;">
                    <h3><i class="fas fa-check-circle" style="color: #10b981;"></i> Generated Project Plan</h3>
                    <div style="margin-top: 1rem; white-space: pre-line; line-height: 1.6;">${result}</div>
                    <button class="btn-secondary" onclick="downloadProject()" style="margin-top: 1rem;">
                        <i class="fas fa-download"></i> Download as ${selectedFormat}
                    </button>
                </div>
            `;
        }
        
        function downloadProject() {
            const content = document.querySelector('#resultArea div div:last-child').innerText;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `project_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        async function loadHistory() {
            if (!currentUser) return;
            
            try {
                const response = await fetch(`${API_URL}/api/history`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                const historyContainer = document.getElementById('historyList');
                
                if (!data.projects || data.projects.length === 0) {
                    historyContainer.innerHTML = '<div class="glass-card" style="padding: 2rem; text-align: center;">No projects generated yet. Start creating!</div>';
                    return;
                }
                
                historyContainer.innerHTML = `
                    <div class="history-grid">
                        ${data.projects.map(project => `
                            <div class="history-item">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                    <span><i class="fas fa-calendar-alt"></i> ${new Date(project.timestamp).toLocaleString()}</span>
                                    <span class="badge" style="background: ${FORMATS.find(f => f.name === project.format)?.color || '#8b5cf6'}; padding: 4px 12px; border-radius: 20px;">${project.format}</span>
                                </div>
                                <div style="font-weight: 600; margin-bottom: 0.5rem;">📝 ${project.input.substring(0, 100)}${project.input.length > 100 ? '...' : ''}</div>
                                <div style="font-size: 0.9rem; opacity: 0.8;">${project.result.substring(0, 150)}...</div>
                                <button class="btn-second    <div style="font-size:12px;color:#6b7280;margin-top:4px;">Duration: Lifetime</div>
    <div id="timerLifetime" style="font-size:12px;color:#ef4444;margin-top:2px;"></div>
  </div>
</div>

<script>
/* SIDEBAR */
function toggleMenu(){document.getElementById("sidebar").classList.toggle("active");}
function togglePricing(){const menu=document.getElementById("pricingMenu");menu.style.display=menu.style.display==='block'?'none':'block';}

/* PLAN SYSTEM */
let userPlan='free';
function upgradePlan(plan){
    userPlan=plan;
    alert('Upgraded to '+plan+' plan!');
    document.getElementById("pricingMenu").style.display='none';
    updatePlanNotice();
}
function updatePlanNotice(){
    const notice=document.getElementById("planNotice");
    if(userPlan==='free'){notice.innerHTML='Upgrade to Pro for full features 🔒';} 
    else{notice.innerHTML='Pro Mode enabled ✅';}
}

/* PLAN TIMERS */
let timerMonthly=3600; // 1 hour offer
let timer6Months=86400; // 1 day offer
let timerLifetime=43200; // 12 hours offer

setInterval(()=>{
    if(timerMonthly>0){timerMonthly--;document.getElementById("timerMonthly").innerText="Offer ends in "+formatTime(timerMonthly);}
    if(timer6Months>0){timer6Months--;document.getElementById("timer6Months").innerText="Offer ends in "+formatTime(timer6Months);}
    if(timerLifetime>0){timerLifetime--;document.getElementById("timerLifetime").innerText="Offer ends in "+formatTime(timerLifetime);}
},1000);

function formatTime(sec){
    let h=Math.floor(sec/3600);
    let m=Math.floor((sec%3600)/60);
    let s=sec%60;
    return `${h}h ${m}m ${s}s`;
}

/* VOICE */
function voice(){
    if(!('webkitSpeechRecognition' in window)){alert('Your browser does not support voice input');return;}
    const rec=new webkitSpeechRecognition();
    rec.onresult=e=>{document.getElementById("text").value=e.results[0][0].transcript;};
    rec.start();
}

/* UPLOAD */
function upload(){alert("Upload file feature coming soon");}

/* GENERATE */
const btn=document.getElementById("generate");
const txt=document.getElementById("text");

txt.addEventListener("input",()=>{if(txt.value){btn.classList.add("active");}else{btn.classList.remove("active");}});
btn.onclick=()=>{
    const output=document.getElementById("output");
    const software=document.getElementById("software").value;
    if(userPlan==='free' && txt.value.length>50){alert("Free plan limit! Upgrade for full access.");return;}
    output.innerHTML=`<div class="output-card"><h3>${software} Project</h3><p>${txt.value}</p></div>`;
};

updatePlanNotice();
</script>

function upgradePlan(plan){
    userPlan=plan;
    alert('Upgraded to '+plan+' plan!');
    document.getElementById("pricingMenu").style.display='none';
    updatePlanNotice();
}
function updatePlanNotice(){
    const notice=document.getElementById("planNotice");
    if(userPlan==='free'){notice.innerHTML='Upgrade to Pro for full features 🔒';} 
    else{notice.innerHTML='Pro Mode enabled ✅';}
}

/* PLAN TIMERS */
let timerMonthly=3600; // 1 hour offer
let timer6Months=86400; // 1 day offer
let timerLifetime=43200; // 12 hours offer

setInterval(()=>{
    if(timerMonthly>0){timerMonthly--;document.getElementById("timerMonthly").innerText="Offer ends in "+formatTime(timerMonthly);}
    if(timer6Months>0){timer6Months--;document.getElementById("timer6Months").innerText="Offer ends in "+formatTime(timer6Months);}
    if(timerLifetime>0){timerLifetime--;document.getElementById("timerLifetime").innerText="Offer ends in "+formatTime(timerLifetime);}
},1000);

function formatTime(sec){
    let h=Math.floor(sec/3600);
    let m=Math.floor((sec%3600)/60);
    let s=sec%60;
    return `${h}h ${m}m ${s}s`;
}

/* VOICE */
function voice(){
    if(!('webkitSpeechRecognition' in window)){alert('Your browser does not support voice input');return;}
    const rec=new webkitSpeechRecognition();
    rec.onresult=e=>{document.getElementById("text").value=e.results[0][0].transcript;};
    rec.start();
}

function upload(){alert("Upload file feature coming soon");}

/* GENERATE */
const btn=document.getElementById("generate");
const txt=document.getElementById("text");

txt.addEventListener("input",()=>{if(txt.value){btn.classList.add("active");}else{btn.classList.remove("active");}});
btn.onclick=()=>{
    const output=document.getElementById("output");
    const software=document.getElementById("software").value;
    if(userPlan==='free' && txt.value.length>50){alert("Free plan limit! Upgrade for full access.");return;}
    output.innerHTML=`<div class="output-card"><h3>${software} Project</h3><p>${txt.value}</p></div>`;
};

updatePlanNotice();
</script>
